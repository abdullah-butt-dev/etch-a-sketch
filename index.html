<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etch a Sketch | Drawing Pad</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1 class="logo">🎨 Etch a Sketch</h1>
      <p class="tagline">Hover to draw • Random colors • Resize anytime</p>
    </header>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-primary js-btn">
        <span>📐</span> Resize Grid
      </button>
      <button class="btn btn-secondary js-clear">
        <span>🗑️</span> Clear Canvas
      </button>
      <div class="size-indicator">
        <span class="size-label">Current Grid:</span>
        <span class="size-value js-size">16 x 16</span>
      </div>
    </div>

    <!-- Drawing Container -->
    <div class="container js-container"></div>

    <!-- Footer -->
    <footer class="footer">
      <p>The Odin Project • Etch a Sketch</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
